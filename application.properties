# ============================================================
# SHARED CONFIG — applies to ALL JusticeServe microservices
# Push this file to: https://github.com/Bharat613/justiceserve-config
# This is the ONLY place where shared config is defined.
# Individual service files only contain server.port and datasource.url
# ============================================================

# JWT — generated in identity-service, validated in api-gateway
app.jwt.secret=JusticeServeSecretKey2025SuperSecureBase64EncodedKeyForHMACSHA256Algorithm
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:4200

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JPA — Hibernate auto-creates/updates tables on every service startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# MySQL credentials
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================================================
# DISABLE Spring Security default random password in console
# We use JWT — there is NO default login page, NO random password
# ================================================================
spring.security.user.name=disabled-not-used
spring.security.user.password=disabled-not-used

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.tracing.sampling.probability=0.1

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# Logging — security at WARN suppresses the default password log line
logging.level.org.springframework.security=WARN
logging.level.com.justiceserve=DEBUG
logging.level.org.hibernate.SQL=DEBUG
